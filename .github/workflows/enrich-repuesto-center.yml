name: Enrich Repuesto Center (one-shot)

# One-shot: agrega marca/modelo/año al nombre de productos de Repuesto Center
# Solo se dispara manualmente cuando hace falta corregir datos viejos

on:
  workflow_dispatch: {}

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Enrich
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python enrich_repuesto_center.py
