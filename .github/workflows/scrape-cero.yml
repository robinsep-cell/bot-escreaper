name: Scrape Importadora Cero

on:
  schedule:
    # 10:00 UTC = 06:00 Chile (horario verano)
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (no escribe en la hoja, solo reporta)"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run cero spider
        env:
          CERO_USER: ${{ secrets.CERO_USER }}
          CERO_PASS: ${{ secrets.CERO_PASS }}
          CERO_SHEET_ID: ${{ secrets.CERO_SHEET_ID }}
          CERO_SHEET_TAB: ${{ secrets.CERO_SHEET_TAB }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python cero_spider.py --dry-run
          else
            python cero_spider.py
          fi
