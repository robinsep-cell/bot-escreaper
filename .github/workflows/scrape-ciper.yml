name: Scrape CIPER

on:
  schedule:
    # Lunes 09:00 UTC = lunes 05:00 Chile
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # ~70K productos via sitemap × ~30/s = ~40 min, margen 4x
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run ciper spider
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python run_to_supabase.py ciper
