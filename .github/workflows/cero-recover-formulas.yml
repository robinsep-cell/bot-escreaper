name: Cero Recover Formulas (one-off)

on:
  workflow_dispatch: {}

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Recover formulas in AJ137:BQ189
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CERO_SHEET_ID: ${{ secrets.CERO_SHEET_ID }}
          CERO_SHEET_TAB: ${{ secrets.CERO_SHEET_TAB }}
        run: python cero_recover_formulas.py
