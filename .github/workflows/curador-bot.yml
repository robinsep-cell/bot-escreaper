name: Curador Bot

on:
  schedule:
    # Cada 15 minutos
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  capturar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt gspread google-auth playwright
      - run: playwright install chromium
      - name: Run curador bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CURADOR_SHEET_ID: ${{ secrets.CURADOR_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python curador_bot.py
