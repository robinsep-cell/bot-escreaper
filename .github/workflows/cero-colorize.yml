name: Cero Colorize Sheet

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo: highlight (verde+naranja) o reset (todo blanco)"
        required: true
        type: choice
        options:
          - highlight
          - reset

jobs:
  colorize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Colorize
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CERO_SHEET_ID: ${{ secrets.CERO_SHEET_ID }}
          CERO_SHEET_TAB: ${{ secrets.CERO_SHEET_TAB }}
        run: python cero_colorize.py ${{ github.event.inputs.mode }}
