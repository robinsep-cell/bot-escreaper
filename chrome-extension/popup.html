<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 320px; padding: 16px; margin: 0; font-size: 14px; color: #222; }
  h2 { color: #0a8; margin: 0 0 12px; font-size: 16px; }
  .stat { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
  .stat span:first-child { color: #666; }
  .stat strong { color: #222; }
  button { width: 100%; padding: 11px; border: none; background: #0a8; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: 0; font-family: inherit; }
  button.primary-blue { background: #1560a8; }
  button:disabled { background: #bbb; cursor: not-allowed; }
  .msg { margin-top: 10px; font-size: 12px; color: #666; min-height: 16px; line-height: 1.4; }
  .footer { margin-top: 14px; padding-top: 10px; border-top: 1px solid #eee; font-size: 11px; color: #888; text-align: center; }
  label { display: block; margin-bottom: 10px; }
  label > span { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 4px; }
  input[type=email], input[type=password], input[type=text] {
    width: 100%; box-sizing: border-box; padding: 9px 10px;
    border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit;
  }
  input#loginOtp { font-family: monospace; font-size: 18px; letter-spacing: 6px; text-align: center; }
  .err { color: #c00; font-size: 12px; min-height: 16px; margin-top: 6px; }
  .ok  { color: #0a8; font-size: 12px; min-height: 16px; margin-top: 6px; }
  .user-bar { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:#888; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid #f0f0f0; }
  .user-bar a { color:#c00; text-decoration:none; cursor:pointer; }
  .tabs { display:flex; background:#f0f0f0; border-radius:6px; padding:3px; margin-bottom:12px; }
  .tabs button { flex:1; padding:7px; background:none; color:#666; border-radius:4px; font-size:13px; font-weight:400; margin:0; }
  .tabs button.active { background:#fff; color:#1560a8; font-weight:600; box-shadow:0 1px 2px rgba(0,0,0,.05); }
  #refresh { margin-top:14px; }
</style>
</head>
<body>
  <h2>🛒 Curador AVR</h2>

  <!-- LOGIN: visible solo sin sesion -->
  <div id="loginPanel" style="display:none;">
    <p style="margin:0 0 12px;font-size:12px;color:#666;">Inicia sesión con tu cuenta de AVR para activar el refresh automático.</p>
    <div class="tabs">
      <button id="tabPass" class="active">Contraseña</button>
      <button id="tabOtp">Código por email</button>
    </div>
    <label><span>Email</span><input id="loginEmail" type="email" autocomplete="username"></label>

    <div id="passBlock">
      <label><span>Contraseña</span><input id="loginPass" type="password" autocomplete="current-password"></label>
      <button id="loginBtn" class="primary-blue">Entrar</button>
    </div>

    <div id="otpBlock" style="display:none;">
      <button id="otpSendBtn">📩 Enviarme código al email</button>
      <label id="otpLabel" style="display:none;margin-top:10px;"><span>Código de 6 dígitos</span><input id="loginOtp" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456"></label>
      <button id="otpVerifyBtn" class="primary-blue" style="display:none;">Verificar código</button>
    </div>

    <div id="loginMsg" class="err"></div>
  </div>

  <!-- ESTADO: visible solo con sesion -->
  <div id="statusPanel" style="display:none;">
    <div class="user-bar">
      <span id="userEmail">—</span>
      <a id="logoutBtn">cerrar sesión</a>
    </div>
    <div class="stat"><span>Estado</span><strong id="estado">cargando...</strong></div>
    <div class="stat"><span>Última corrida</span><span id="last">—</span></div>
    <div class="stat"><span>Refrescados</span><span id="updated">—</span></div>
    <div class="stat"><span>Fallidos</span><span id="failed">—</span></div>
    <button id="refresh">🔄 Refrescar ahora</button>
    <div class="msg" id="msg"></div>
    <div class="footer">Ejecuta cada 12h en background mientras Chrome esté abierto</div>
  </div>
<script src="popup.js"></script>
</body>
</html>
